name: Java CI with Maven

on:
  workflow_dispatch:
    inputs:
      groups:
        description: 'Category filter for the by-tag job (fully-qualified class name, e.g. com.oleynik.qa.workshop.junit.grouping.categories.SmokeTests). Leave empty to skip that job.'
        required: false
        default: ''

jobs:

  regression:
    name: Regression — all tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run all tests and generate report
        run: |
          chmod +x mvnw
          ./mvnw -B clean site
      - name: Upload Surefire report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: target/site/
          retention-days: 14
      - name: Upload JUnit XML results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml-results
          path: target/surefire-reports/
          retention-days: 14

  by-tag:
    name: By category — ${{ inputs.groups }}
    runs-on: ubuntu-latest
    if: ${{ inputs.groups != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests for category '${{ inputs.groups }}'
        run: |
          chmod +x mvnw
          ./mvnw -B clean site -Dgroups=${{ inputs.groups }}
      - name: Upload Surefire report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report-${{ inputs.groups }}
          path: target/site/
          retention-days: 14
      - name: Upload JUnit XML results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml-results-${{ inputs.groups }}
          path: target/surefire-reports/
          retention-days: 14
